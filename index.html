<!DOCTYPE html>
<html>

<head>
    <title>Dynamic Website</title>

    <style>

        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: blue;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Dynamic Website</h1>

        <p>
            This website is deployed using Heroku or AWS.
        </p>

        <h3>Available Routes</h3>

        <p>/about</p>
        <p>/contact</p>
        <p>/students</p>

    </div>

</body>

</html>
